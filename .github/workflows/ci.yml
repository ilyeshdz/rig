name: CI

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Format, Check, Test, Bench
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Deno format (check)
        run: deno fmt --check

      - name: Deno check
        run: deno check src/main.ts tests/test-runner.ts

      - name: Deno test
        run: deno task test

      - name: Deno bench
        run: deno task bench
